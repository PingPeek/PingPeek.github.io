<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowLens - Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #60a5fa; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 3rem; font-size: 0.95rem; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 2rem;
      width: 220px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #60a5fa; transform: translateY(-2px); }
    .card-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.85rem; color: #94a3b8; }
    footer { margin-top: 3rem; color: #4a5568; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="logo">FlowLens</div>
  <p class="subtitle">Android Local Network Simulation &amp; Traffic Audit Tool</p>
  <div class="cards">
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">Learn how we handle your data</div>
    </a>
    <a class="card" href="terms.html">
      <div class="card-icon">📄</div>
      <div class="card-title">Terms of Service</div>
      <div class="card-desc">Learn the terms and conditions for using this app</div>
    </a>
  </div>
  <footer>© 2026 FlowLens. All rights reserved.</footer>
</body>
</html>
